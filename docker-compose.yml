services:
  database:
    image: postgres:16-alpine
    container_name: fontanella-postgres-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: fontanella
      POSTGRES_PASSWORD: fontanella_pwd
      POSTGRES_DB: fontanella_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d

volumes:
  postgres-data:
